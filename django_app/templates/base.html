{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}No-Code Platform{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'builder/css/dashboard.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="{% url 'home' %}" class="site-logo">
                NoCode Builder
            </a>

            <nav class="site-nav">
                <a href="{% url 'home' %}">Home</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'project-list' %}">Projects</a>
                {% endif %}
            </nav>
        </div>
    </header>
    {% block content %}{% endblock %}
    {% block js %}{% endblock %}
    
</body>
</html>
